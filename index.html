<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Binary Logic Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #09090b;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 255, 255, 0.03), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.04), transparent 25%);
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            overscroll-behavior-y: none;
        }

        .font-mono {
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
        }

        ::-webkit-scrollbar { width: 0px; height: 0px; }
        
        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .display-screen {
            background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.2) 100%);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn {
            will-change: transform;
            transform: translateZ(0);
            backface-visibility: hidden;
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.15s ease;
        }

        .btn:active {
            transform: scale(0.92) translateZ(0);
        }

        .btn-num {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .btn-num:active { background: rgba(255, 255, 255, 0.1); }

        .btn-op {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }
        .btn-op:active { background: rgba(59, 130, 246, 0.2); }

        .btn-action {
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid rgba(244, 63, 94, 0.2);
            color: #fb7185;
        }
        .btn-action:active { background: rgba(244, 63, 94, 0.2); }

        .btn-equals {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
        }
        .btn-equals:active {
            background: rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body class="h-[100dvh] w-screen overflow-hidden flex items-center justify-center text-white selection:bg-blue-500/30 p-4">

    <!-- Main Wrapper: Shrunk to 320px and height set to auto to form a centered card -->
    <div class="w-full max-w-[320px] flex flex-col gap-3">
        
        <!-- Header -->
        <div class="text-center px-1 flex justify-between items-end">
            <div class="text-left">
                <h1 class="text-base font-bold tracking-wider text-white/90 flex items-center gap-2">
                    <div class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></div>
                    BIN<span class="text-blue-500">CALC</span>
                </h1>
                <p class="text-[8px] text-white/40 font-mono mt-0.5 tracking-widest">8-BIT LOGIC ENGINE</p>
            </div>
            <div class="text-[8px] font-mono text-white/30 border border-white/10 px-2 py-1 rounded-md bg-white/5">
                STRICT MODE
            </div>
        </div>

        <!-- Calculator Interface -->
        <div class="glass-container rounded-[2rem] p-4 flex flex-col gap-3">
            
            <!-- Display Area: Fixed height (h-28) -->
            <div class="display-screen w-full h-28 rounded-2xl p-3 flex flex-col relative overflow-hidden">
                <!-- History Log -->
                <div id="history" class="flex-1 overflow-y-auto text-right text-[10px] text-white/40 font-mono space-y-1 pb-1 flex flex-col justify-end scroll-smooth">
                    <!-- History items injected via JS -->
                </div>
                <!-- Current Input -->
                <div id="display" class="w-full overflow-x-auto text-right text-4xl font-mono tracking-tight text-white whitespace-nowrap pb-1 scroll-smooth mt-1">
                    0
                </div>
            </div>

            <!-- Keypad Grid: Fixed button heights (h-14) -->
            <div class="grid grid-cols-4 gap-2">
                
                <!-- Row 1: Actions -->
                <button class="btn btn-action col-span-2 rounded-2xl text-lg font-semibold flex items-center justify-center h-14 w-full" onclick="handleInput('C')">C</button>
                <button class="btn btn-action col-span-2 rounded-2xl text-lg font-semibold flex items-center justify-center h-14 w-full" onclick="handleInput('⌫')">⌫</button>
                
                <!-- Row 2: Numbers -->
                <button class="btn btn-num col-span-2 rounded-2xl text-3xl font-mono text-white flex items-center justify-center h-14 w-full" onclick="handleInput('1')">1</button>
                <button class="btn btn-num col-span-2 rounded-2xl text-3xl font-mono text-white flex items-center justify-center h-14 w-full" onclick="handleInput('0')">0</button>
                
                <!-- Row 3: Operators -->
                <button class="btn btn-op col-span-2 rounded-2xl text-3xl font-mono flex items-center justify-center pb-1 h-14 w-full" onclick="handleInput('+')">+</button>
                <button class="btn btn-op col-span-2 rounded-2xl text-3xl font-mono flex items-center justify-center pb-1 h-14 w-full" onclick="handleInput('-')">-</button>
                
                <!-- Row 4: Equals -->
                <button class="btn btn-equals col-span-4 rounded-2xl text-3xl font-mono flex items-center justify-center pb-1 h-14 w-full" onclick="handleInput('=')">=</button>
                
            </div>
        </div>
    </div>

    <script>
        // State Management
        let currentExpression = "";
        let historyLog = [];
        let justCalculated = false;

        // DOM Elements
        const displayEl = document.getElementById('display');
        const historyEl = document.getElementById('history');

        // Haptic Feedback Engine
        function triggerHaptic(type = 'light') {
            if (!navigator.vibrate) return;
            if (type === 'light') navigator.vibrate(10);
            if (type === 'medium') navigator.vibrate(20);
            if (type === 'heavy') navigator.vibrate([15, 30, 15]);
        }

        function calculateBinary(expression) {
            if (!expression) return "";

            let tokens = [];
            let currentNum = "";
            
            for (let i = 0; i < expression.length; i++) {
                const char = expression[i];
                if (char === '+' || char === '-') {
                    if (i === 0 && char === '-') {
                        currentNum += char;
                    } else {
                        if (currentNum !== "") {
                            tokens.push(currentNum);
                            currentNum = "";
                        }
                        tokens.push(char);
                    }
                } else {
                    currentNum += char;
                }
            }
            if (currentNum !== "") tokens.push(currentNum);
            if (tokens.length === 0) return "";

            if (tokens[tokens.length - 1] === '+' || tokens[tokens.length - 1] === '-') {
                tokens.pop();
            }

            let result = parseInt(tokens[0], 2);
            if (isNaN(result)) return "";

            for (let i = 1; i < tokens.length; i += 2) {
                const operator = tokens[i];
                const nextNum = parseInt(tokens[i + 1], 2);
                
                if (isNaN(nextNum)) break;

                if (operator === '+') {
                    result += nextNum;
                } else if (operator === '-') {
                    result -= nextNum;
                }
            }

            if (result < 0) {
                return "-" + Math.abs(result).toString(2);
            }
            return result.toString(2);
        }

        function updateDisplay() {
            displayEl.innerText = currentExpression || "0";
            requestAnimationFrame(() => {
                displayEl.scrollLeft = displayEl.scrollWidth;
            });
        }

        function updateHistoryUI() {
            historyEl.innerHTML = historyLog.map(item => 
                `<div class="opacity-70 hover:opacity-100 transition-opacity duration-200">${item}</div>`
            ).join('');
            requestAnimationFrame(() => {
                historyEl.scrollTop = historyEl.scrollHeight;
            });
        }

        function handleInput(key) {
            const operators = ['+', '-'];
            const lastChar = currentExpression.slice(-1);

            if (key === 'C') {
                triggerHaptic('heavy');
                currentExpression = "";
                justCalculated = false;
            } 
            else if (key === '⌫') {
                triggerHaptic('medium');
                if (justCalculated) {
                    currentExpression = "";
                    justCalculated = false;
                } else {
                    currentExpression = currentExpression.slice(0, -1);
                    if (currentExpression === "-") currentExpression = "";
                }
            } 
            else if (key === '=') {
                triggerHaptic('heavy');
                if (!currentExpression || operators.includes(lastChar)) return;

                const result = calculateBinary(currentExpression);
                if (result === "" || result === "NaN") return;
                
                historyLog.push(`${currentExpression} = <span class="text-white/80">${result}</span>`);
                if (historyLog.length > 4) historyLog.shift(); 
                
                updateHistoryUI();
                currentExpression = result;
                justCalculated = true;
            } 
            else if (operators.includes(key)) {
                triggerHaptic('medium');
                justCalculated = false;
                if (currentExpression === "") return;
                
                if (operators.includes(lastChar)) {
                    currentExpression = currentExpression.slice(0, -1) + key;
                } else {
                    currentExpression += key;
                }
            } 
            else if (key === '1' || key === '0') {
                triggerHaptic('light');
                if (justCalculated) {
                    currentExpression = key;
                    justCalculated = false;
                } else {
                    const segments = currentExpression.split(/[+-]/);
                    const currentSegment = segments[segments.length - 1];
                    
                    if (currentSegment === "0" && key === "0") {
                        return; 
                    } else if (currentSegment === "0" && key === "1") {
                        currentExpression = currentExpression.slice(0, -1) + "1";
                    } else {
                        currentExpression += key;
                    }
                }
            }

            updateDisplay();
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key;
            if (['0', '1', '+', '-'].includes(key)) {
                e.preventDefault();
                handleInput(key);
            }
            if (key === 'Enter' || key === '=') {
                e.preventDefault();
                handleInput('=');
            }
            if (key === 'Backspace') {
                e.preventDefault();
                handleInput('⌫');
            }
            if (key.toLowerCase() === 'c' || key === 'Escape') {
                e.preventDefault();
                handleInput('C');
            }
        });
    </script>
</body>
</html>
